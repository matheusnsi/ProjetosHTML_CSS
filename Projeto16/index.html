<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills Bar Animada</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="skills-wrapper">
    <h1>My Skills</h1>

    <div class="skill-box">
      <div class="title-row">
        <span>HTML</span>
        <span>90%</span>
      </div>
      <div class="bar">
        <span class="progress html"></span>
      </div>
    </div>

    <div class="skill-box">
      <div class="title-row">
        <span>CSS</span>
        <span>80%</span>
      </div>
      <div class="bar">
        <span class="progress css"></span>
      </div>
    </div>

    <div class="skill-box">
      <div class="title-row">
        <span>JavaScript</span>
        <span>70%</span>
      </div>
      <div class="bar">
        <span class="progress js"></span>
      </div>
    </div>

    <div class="skill-box">
      <div class="title-row">
        <span>React</span>
        <span>65%</span>
      </div>
      <div class="bar">
        <span class="progress react"></span>
      </div>
    </div>
  </section>
</body>
</html>
