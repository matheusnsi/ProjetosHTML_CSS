<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Profile Cards</title>

  <!-- Boxicons -->
  <link
    href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="cards-container">

    <!-- Card 1 -->
    <article class="profile-card">
      <div class="image">
        <img src="https://plus.unsplash.com/premium_photo-1688572454849-4348982edf7d?q=80&w=688&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Foto de perfil Ana" class="profile-img" />
      </div>

      <div class="text-data">
        <span class="name">Ana Souza</span>
        <span class="job">UI/UX Designer</span>
      </div>

      <div class="media-buttons">
        <a href="#" style="--clr:#1877f2" class="link"><i class='bx bxl-facebook'></i></a>
        <a href="#" style="--clr:#1da1f2" class="link"><i class='bx bxl-twitter'></i></a>
        <a href="#" style="--clr:#e4405f" class="link"><i class='bx bxl-instagram'></i></a>
        <a href="#" style="--clr:#ff0000" class="link"><i class='bx bxl-youtube'></i></a>
      </div>

      <div class="buttons">
        <button class="button">Follow</button>
        <button class="button button-outline">Message</button>
      </div>

      <div class="analytics">
        <div class="data">
          <i class='bx bx-heart'></i>
          <span class="number">60k</span>
        </div>
        <div class="data">
          <i class='bx bx-message-rounded'></i>
          <span class="number">20k</span>
        </div>
        <div class="data">
          <i class='bx bx-share'></i>
          <span class="number">12k</span>
        </div>
      </div>
    </article>

    <!-- Card 2 -->
    <article class="profile-card">
      <div class="image">
        <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=500&q=80" alt="Foto de perfil Carlos" class="profile-img" />
      </div>

      <div class="text-data">
        <span class="name">Carlos Lima</span>
        <span class="job">Front-end Developer</span>
      </div>

      <div class="media-buttons">
        <a href="#" style="--clr:#1877f2" class="link"><i class='bx bxl-facebook'></i></a>
        <a href="#" style="--clr:#1da1f2" class="link"><i class='bx bxl-twitter'></i></a>
        <a href="#" style="--clr:#0a66c2" class="link"><i class='bx bxl-linkedin'></i></a>
        <a href="#" style="--clr:#333333" class="link"><i class='bx bxl-github'></i></a>
      </div>

      <div class="buttons">
        <button class="button">Follow</button>
        <button class="button button-outline">Message</button>
      </div>

      <div class="analytics">
        <div class="data">
          <i class='bx bx-heart'></i>
          <span class="number">42k</span>
        </div>
        <div class="data">
          <i class='bx bx-message-rounded'></i>
          <span class="number">9k</span>
        </div>
        <div class="data">
          <i class='bx bx-share'></i>
          <span class="number">5k</span>
        </div>
      </div>
    </article>

    <!-- Card 3 -->
    <article class="profile-card">
      <div class="image">
        <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=500&q=80" alt="Foto de perfil Júlia" class="profile-img" />
      </div>

      <div class="text-data">
        <span class="name">Júlia Martins</span>
        <span class="job">Content Creator</span>
      </div>

      <div class="media-buttons">
        <a href="#" style="--clr:#1da1f2" class="link"><i class='bx bxl-twitter'></i></a>
        <a href="#" style="--clr:#e4405f" class="link"><i class='bx bxl-instagram'></i></a>
        <a href="#" style="--clr:#25d366" class="link"><i class='bx bxl-whatsapp'></i></a>
        <a href="#" style="--clr:#ff0000" class="link"><i class='bx bxl-youtube'></i></a>
      </div>

      <div class="buttons">
        <button class="button">Follow</button>
        <button class="button button-outline">Message</button>
      </div>

      <div class="analytics">
        <div class="data">
          <i class='bx bx-heart'></i>
          <span class="number">98k</span>
        </div>
        <div class="data">
          <i class='bx bx-message-rounded'></i>
          <span class="number">34k</span>
        </div>
        <div class="data">
          <i class='bx bx-share'></i>
          <span class="number">18k</span>
        </div>
      </div>
    </article>

  </section>
</body>
</html>
