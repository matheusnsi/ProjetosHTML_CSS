<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="nav">
      <input type="radio" name="tab" id="home" checked />
      <input type="radio" name="tab" id="about" />
      <input type="radio" name="tab" id="services" />
      <input type="radio" name="tab" id="portfolio" />
      <input type="radio" name="tab" id="contact" />

      <div class="tabs">
        <label for="home" class="tab">Home</label>
        <label for="about" class="tab">Sobre</label>
        <label for="services" class="tab">Serviços</label>
        <label for="portfolio" class="tab">Portfólio</label>
        <label for="contact" class="tab">Contato</label>

        <span class="indicator"></span>
      </div>
    </nav>
  </body>
</html>
