<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sony Product Card | CodingNepal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="left-side">
            <div class="content">
                <h2>Description</h2>
                <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Cumque consequatur corporis vitae nobis, ut veniam earum expedita eaque at placeat perferendis unde voluptates explicabo rerum distinctio quis, illo, porro et?</p>
                
                <div class="rating">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="far fa-star"></i>
                </div>

                <div class="price">
                    <span class="old-price">$1800.00</span>
                    <span class="new-price">$1500.00</span>
                </div>

                <button class="add-btn">Add To Cart</button>
            </div>
        </div>

        <div class="right-side">
            <div class="circle"></div>
            <img src="images/camera.png" alt="Sony Alpha" class="product-img">
            
            <div class="product-info">
                <span class="brand">SONY</span>
                <h3>SONY ALPHA A7 KIT</h3>
                <span class="shipping">FREE SHIPPING</span>
                <button class="login-btn">Login For More</button>
            </div>
        </div>
    </div>

</body>
</html>
