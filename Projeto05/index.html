<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website com Imagens Dinâmicas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="hero">
    <div class="container">
        <nav>
            <img src="images/logo.png" class="logo">
            <ul>
                <li><a href="#">Explorar</a></li>
                <li><a href="#">Sobre</a></li>
            </ul>
            <button type="button">Contatos</button>
        </nav>

        <div class="info">
            <h1>VIAJE PELO MUNDO</h1>
            <p>Descubra destinos incríveis com imagens que ganham vida. <br> Navegue pela galeria abaixo para mudar o cenário.</p>
            <input type="text" placeholder="Procure seu destino...">
        </div>

        <div class="slider">
            <img src="images/left-arrow.png" id="back">
            <div class="preview">
                <img src="images/small1.png" class="thumbnail active">
                <img src="images/small2.png" class="thumbnail">
                <img src="images/small3.png" class="thumbnail">
                <img src="images/small4.png" class="thumbnail">
                <img src="images/small5.png" class="thumbnail">
            </div>
            <img src="images/right-arrow.png" id="next">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
