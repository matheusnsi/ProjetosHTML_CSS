<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Rating Widget (Corrigido)</title>

  <!-- Font Awesome para os ícones de estrela -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rating-wrapper">
  <!-- Inputs de rádio (escondidos) -->
  <input type="radio" name="rating" id="star-1">
  <input type="radio" name="rating" id="star-2">
  <input type="radio" name="rating" id="star-3">
  <input type="radio" name="rating" id="star-4">
  <input type="radio" name="rating" id="star-5">

  <div class="rating-content">
    <div class="stars">
      <label for="star-1" class="star star-1"><i class="fa-solid fa-star"></i></label>
      <label for="star-2" class="star star-2"><i class="fa-solid fa-star"></i></label>
      <label for="star-3" class="star star-3"><i class="fa-solid fa-star"></i></label>
      <label for="star-4" class="star star-4"><i class="fa-solid fa-star"></i></label>
      <label for="star-5" class="star star-5"><i class="fa-solid fa-star"></i></label>
    </div>

    <div class="footer">
      <span class="text"></span>
      <span class="emoji"></span>
    </div>
  </div>
</div>

</body>
</html>
