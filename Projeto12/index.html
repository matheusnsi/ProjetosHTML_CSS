<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário de Contato Responsivo</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="left-side">
          <div class="address details">
            <i class="fas fa-map-marker-alt"></i>
            <div class="topic">Endereço</div>
            <div class="text-one">Rua Exemplo, 123</div>
            <div class="text-two">São Paulo, Brasil</div>
          </div>
          <div class="phone details">
            <i class="fas fa-phone-alt"></i>
            <div class="topic">Telefone</div>
            <div class="text-one">+55 (11) 99999-9999</div>
            <div class="text-two">+55 (11) 98888-8888</div>
            <div class="email details"></div>
            <i class="fas fa-envelope"></i>
            <div class="topic">Email</div>
            <div class="text-one">info@matheussilveira.com</div>
            <div class="text-two">suporte@matheussilveira.com</div>
          </div>
        </div>

        <div class="right-side">
          <div class="topic-text">Fale Conosco</div>
          <p>
            Se tiver alguma dúvida ou quiser entrar em contato conosco, por
            favor, preencha o formulário abaixo .
          </p>
          <form action="#">
            <div class="input-box">
              <input type="text" placeholder="Nome" />
            </div>
            <div class="input-box">
              <input type="text" placeholder="Email" />
            </div>
            <div class="input-box message-box">
              <textarea placeholder="Escreva aqui sua mensagem"></textarea>
            </div>
            <div class="button">
              <input type="button" value="Enviar Agora" />
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
